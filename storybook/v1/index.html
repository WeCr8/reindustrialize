the company decision."}, {"number": 133, "section": "Chapter 1 Milestones", "title": "ZACH \u00b7 THE NEXT FACILITY \u00b7 Founder J", "text": "You have outgrown the garage. Now build systems, not just parts.", "image": "../../packages/assets/story-expansion-female-founder-v1.png", "status": "implemented", "founder": "av_f_indian_hd", "sprite": "../../packages/assets/sprites/av_f_indian_hd.png", "voice": "zach_expansion", "storySequence": "garage_graduation", "storyBeat": "garage_graduation_expansion", "note": "Exact runtime caption and Founder J identity proof; Zach is mentor and the founder owns the company decision."}, {"number": 134, "section": "Shop Tour", "title": "01 \u00b7 GARAGE BAY \u00b7 MATERIAL TO SHIPMENT", "text": "Before we take the first order, learn the floor. Material enters at receiving, moves through preparation and machining, then leaves only after inspection and a clean handoff.", "image": "../../packages/assets/sprites/whiteboard.png", "status": "playable", "location": "East wall mission board \u00b7 full route overview", "instructions": ["Follow the pulsing objective and use GO TO & OPEN when you need guidance."], "voice": "zach_tour_overview"}, {"number": 135, "section": "Shop Tour", "title": "02 \u00b7 PLANNING DESK \u00b7 ACCEPT AND ROUTE WORK", "text": "This is the planning desk. Open it to accept customer work, read the print, confirm the material, and understand the route before anyone touches the stock.", "image": "../../packages/assets/sprites/planning_desk_hd.png", "status": "playable", "location": "North wall \u00b7 left of the NOX terminal", "instructions": ["Open the desk to accept the next customer job and read its traveler."], "voice": "zach_tour_planning"}, {"number": 136, "section": "Shop Tour", "title": "03 \u00b7 NOX TERMINAL \u00b7 ORDER CERTIFIED STOCK", "text": "The NOX terminal is where you order certified raw material. Match the alloy and size to the job, check the cost, then confirm delivery to receiving.", "image": "../../packages/assets/materials/nox-metals-exterior-v1.png", "status": "playable", "location": "North wall \u00b7 immediately right of planning", "instructions": ["Choose the required alloy and dimensions, verify coin cost, and confirm the order."], "voice": "zach_tour_material"}, {"number": 137, "section": "Shop Tour", "title": "04 \u00b7 BANDSAW \u00b7 PREPARE THE RAW BLANK", "text": "The bandsaw turns delivered stock into a controlled blank. Open the station, enter the required cut length, and leave enough material for clean finishing operations.", "image": "../../packages/assets/sprites/saw_t1_hd.png", "status": "playable", "location": "West production lane \u00b7 between receiving and the manual mill", "instructions": ["Accept a job first, open the saw, and enter the cut length shown on the traveler."], "voice": "zach_tour_saw"}, {"number": 138, "section": "Shop Tour", "title": "05 \u00b7 TOOL CART \u00b7 BUILD THE CNC TOOL KIT", "text": "The tool cart is your setup station. Choose the correct cutter, control stickout, gauge the probe and chamfer tool, and install the complete kit before machining.", "image": "../../packages/assets/equipment/tool-cart-open-v1.png", "status": "playable", "location": "Center-left \u00b7 beside the VMC", "instructions": ["Select the cutter, set stickout, add the probe and chamfer tool, then install all three."], "voice": "zach_tour_tooling"}, {"number": 139, "section": "Shop Tour", "title": "06 \u00b7 VMC \u00b7 PROVE THE PROGRAM AND MAKE THE PART", "text": "The vertical machining center makes the part. Load only prepared stock and a complete tool kit, verify every G code answer, then run and inspect the result.", "image": "../../packages/assets/equipment/vmc-open-v1.png", "status": "playable", "location": "Center machine island \u00b7 right of the tool cart", "instructions": ["Prepare stock and tools first, open the VMC, complete the G-code checks, and start the cycle."], "voice": "zach_tour_vmc"}, {"number": 140, "section": "Shop Tour", "title": "07 \u00b7 SHOP CLASS \u00b7 LEARN THE WHY", "text": "Shop Class is where we stop and learn the reason behind the process. Use it to review speeds, feeds, material behavior, quality, and the math that protects the machine.", "image": "../../packages/assets/sprites/chalkboard.png", "status": "orientation", "location": "Northwest learning corner", "instructions": ["Approach the chalkboard to review manufacturing principles and formulas."], "voice": "zach_tour_shop_class"}, {"number": 141, "section": "Shop Tour", "title": "08 \u00b7 MANUAL MILL \u00b7 DIRECT MACHINE CONTROL", "text": "The manual mill teaches direct control of workholding, spindle speed, feed, and depth. Its production lesson is orientation only until the manual machining task is enabled.", "image": "../../packages/assets/sprites/mill_manual_t1_hd.png", "status": "orientation", "location": "West production lane \u00b7 below the bandsaw", "instructions": ["Orientation only: the production minigame remains a documented release gap."], "voice": "zach_tour_manual_mill"}, {"number": 142, "section": "Shop Tour", "title": "09 \u00b7 DEBURR BENCH \u00b7 SAFE FINISHED EDGES", "text": "The deburr bench removes sharp edges and prepares the part for inspection. The future task will require the correct edge break without damaging a finished feature.", "image": "../../packages/assets/sprites/bench_deburr_t1_hd.png", "status": "orientation", "location": "South-center finishing lane", "instructions": ["Orientation only: deburr interaction and edge-quality scoring remain to be implemented."], "voice": "zach_tour_deburr"}, {"number": 143, "section": "Shop Tour", "title": "10 \u00b7 CNC LATHE \u00b7 TURNING WORK", "text": "The CNC lathe rotates the stock against the tool. Inspect chuck pressure, stock stickout, turret clearance, and the program before any production cycle.", "image": "../../packages/assets/equipment/lathe-open-v1.png", "status": "inspection", "location": "East machine island \u00b7 right of the VMC", "instructions": ["Open the lathe for an equipment inspection; production turning remains a future workflow."], "voice": "zach_tour_lathe"}, {"number": 144, "section": "Shop Tour", "title": "11 \u00b7 MTCONNECT \u00b7 MACHINE VISIBILITY", "text": "The MTConnect node exposes machine status and production signals. It becomes useful when the shop grows from watching one machine to managing an entire connected system.", "image": "../../packages/assets/sprites/network_node_t3.png", "status": "orientation", "location": "North data lane", "instructions": ["Orientation only: connectivity gameplay unlocks in a later facility chapter."], "voice": "zach_tour_mtconnect"}, {"number": 145, "section": "Shop Tour", "title": "12 \u00b7 JOBLINE \u00b7 SHIFT HANDOFF", "text": "The JobLine handoff terminal records what ran, what comes next, and what looks unusual. A clean handoff prevents the next shift from starting with missing context.", "image": "../../packages/assets/sprites/handoff_terminal_t4.png", "status": "orientation", "location": "Northeast data lane", "instructions": ["Orientation only: handoff gameplay unlocks with multi-person production."], "voice": "zach_tour_handoff"}, {"number": 146, "section": "Shop Tour", "title": "13 \u00b7 RECEIVING \u00b7 VERIFY INCOMING STOCK", "text": "Receiving is where certified stock enters the shop. Verify the alloy, dimensions, quantity, and certification before material moves into the production route.", "image": "../../packages/assets/sprites/nox_pallet_hd.png", "status": "orientation", "location": "Southwest receiving zone", "instructions": ["After ordering, verify the incoming alloy, dimensions, quantity, and certification."], "voice": "zach_tour_receiving"}, {"number": 147, "section": "Shop Tour", "title": "14 \u00b7 MISSION BOARD \u00b7 KNOW THE NEXT STEP", "text": "The mission board shows the current objective and chapter gate. When you are unsure, follow the pulsing target or use Go To and Open to reach the correct station.", "image": "../../packages/assets/sprites/whiteboard.png", "status": "playable", "location": "East wall", "instructions": ["Read the objective, requirements, job count, and quality gate; use GO TO & OPEN for routing."], "voice": "zach_tour_missions"}, {"number": 148, "section": "Production Tutorials", "title": "ORDER MATERIAL", "text": "Start with certified stock. Match the alloy, thickness, and quantity to the print before you spend a dollar.", "image": "../../packages/assets/materials/nox-metals-exterior-v1.png", "status": "playable", "location": "North wall \u00b7 NOX material terminal", "instructions": ["Open the NOX terminal", "Compare alloy, condition, dimensions, certification, and cost", "Choose 6061-T6 plate for the first job", "Confirm the order and verify the delivery record"], "voice": "zach_order_stock", "success": "Material order exists, coins are deducted, and next-day delivery is recorded"}, {"number": 149, "section": "Production Tutorials", "title": "ACCEPT JOB", "text": "Your first customer job is on the planning desk. I advise. You own every decision.", "image": "../../packages/assets/sprites/planning_desk_hd.png", "status": "playable", "location": "North wall \u00b7 planning desk", "instructions": ["Open planning", "Read the job card and material", "Accept the customer order", "Confirm the bandsaw becomes the next objective"], "voice": "zach_first_job", "success": "Active job and traveler are loaded"}, {"number": 150, "section": "Production Tutorials", "title": "CUT RAW STOCK", "text": "Cut the raw stock to length before it goes near the CNC. Leave enough material to face both ends cleanly.", "image": "../../packages/assets/sprites/saw_t1_hd.png", "status": "playable", "location": "West production lane \u00b7 bandsaw", "instructions": ["Read the traveler cut length", "Enter the required saw length", "Keep the blank within tolerance", "Confirm the cut before routing forward"], "voice": "zach_cut_stock", "success": "Raw stock ready is true"}, {"number": 151, "section": "Production Tutorials", "title": "SELECT PRIMARY TOOL", "text": "Set the right tools, confirm each offset, and keep the stickout as short as the job allows.", "image": "../../packages/assets/equipment/tool-cart-open-v1.png", "status": "playable", "location": "Center-left \u00b7 tool cart", "instructions": ["Read the feature on the job card", "Choose drill, flat end mill, or ball mill", "Reject tools that cannot create the required geometry"], "voice": "zach_tool_setup", "success": "Correct primary cutter selected"}, {"number": 152, "section": "Production Tutorials", "title": "SET STICKOUT", "text": "Set the right tools, confirm each offset, and keep the stickout as short as the job allows.", "image": "../../packages/assets/equipment/tool-cart-open-v1.png", "status": "playable", "location": "Center-left \u00b7 tool cart", "instructions": ["Read required depth and clearance", "Move the tool tip to the gold target line", "Avoid excess extension that creates chatter", "Lock the measured value"], "voice": "zach_tool_setup", "success": "Stickout is within the job tolerance"}, {"number": 153, "section": "Production Tutorials", "title": "COMPLETE TOOL KIT", "text": "Set the right tools, confirm each offset, and keep the stickout as short as the job allows.", "image": "../../packages/assets/equipment/tool-cart-open-v1.png", "status": "playable", "location": "Center-left \u00b7 tool cart", "instructions": ["Gauge the primary cutter", "Add the probe", "Add the chamfer tool", "Install the complete three-tool kit"], "voice": "zach_tool_setup", "success": "Tool ready is true and three tools are installed"}, {"number": 154, "section": "Production Tutorials", "title": "PROVE GCODE", "text": "Read the program one block at a time. Know where the tool will go before you press cycle start.", "image": "../../packages/assets/equipment/vmc-open-v1.png", "status": "playable", "location": "Center machine island \u00b7 VMC", "instructions": ["Verify the work offset", "Verify clockwise spindle direction", "Verify coolant command", "Correct every invalid G or M code field"], "voice": "zach_gcode_intro", "success": "All proofing fields pass validation"}, {"number": 155, "section": "Production Tutorials", "title": "RUN CNC CYCLE", "text": "If the setup does not look right, stop. A safe pause costs less than a crash.", "image": "../../packages/assets/equipment/vmc-open-v1.png", "status": "playable", "location": "Center machine island \u00b7 VMC", "instructions": ["Review the simulated path", "Press cycle start", "Observe feed motion, coolant, chips, and tool clearance", "Allow the cycle to reach part complete"], "voice": "zach_response_safe_stop", "success": "Machining animation completes without an invalid setup"}, {"number": 156, "section": "Production Tutorials", "title": "REVIEW QUALITY RESULT", "text": "The first part is evidence, not inventory. Inspect it before you commit the rest of the material.", "image": "../../packages/assets/equipment/vmc-open-v1.png", "status": "playable", "location": "VMC result and future inspection route", "instructions": ["Read the A through F grade", "Review hints or mistakes that reduced the grade", "Record the quality score and payment", "Return to planning for the next job"], "voice": "zach_first_article", "success": "Job shipped, quality grade stored, and next job unlocked"}, {"number": 157, "section": "Factory Workforce", "title": "CNC Programmer \u00b7 Maya Chen", "text": "First-part prove-outs and toolpath optimization. Growth: cell lead. Watch: Can over-engineer simple repeat work", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: planning_desk, vmc_t2, lathe_cnc_t2", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 0, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 158, "section": "Workforce Conversations", "title": "TALK WITH Maya Chen", "text": "I want the print, the workholding plan, and the risky moves before I touch the program.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "CNC Programmer", "instructions": ["I can review the next toolpath or help an operator understand why the code moves that way.", "I am checking the prove-out and watching clearance at the assigned station.", "PLAYER: What makes a program production-ready?", "MAYA CHEN: Clear intent, safe approach moves, controlled offsets, proven tools, and an operator who knows what normal looks like."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 0, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 159, "section": "Factory Workforce", "title": "CNC Operator \u00b7 Luis Ortega", "text": "Repeatable production and clean handoffs. Growth: setup technician. Watch: Needs a clear written traveler", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: saw_t1, vmc_t2, lathe_cnc_t2, bench_deburr_t1", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 1, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 160, "section": "Workforce Conversations", "title": "TALK WITH Luis Ortega", "text": "Give me a clear traveler and I will keep the spindle making good parts.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "CNC Operator", "instructions": ["If priorities changed, update the traveler before we create confusion.", "I am watching the cycle, checking the part, and recording anything the next shift needs.", "PLAYER: What should an operator watch?", "LUIS ORTEGA: Sound, chips, coolant, load, dimensions, and anything different from the proven cycle."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 1, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 161, "section": "Factory Workforce", "title": "Setup Technician \u00b7 Devon Brooks", "text": "Workholding, offsets, tooling and fast changeovers. Growth: manufacturing engineer. Watch: Documentation trails hands-on work", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: tool_cart, vmc_t2, lathe_cnc_t2, mill_manual_t1", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 2, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 162, "section": "Workforce Conversations", "title": "TALK WITH Devon Brooks", "text": "A fast setup starts with clean tools, known offsets, and workholding that repeats.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Setup Technician", "instructions": ["I can prepare the next fixture and stage the tool kit.", "I am setting the station so the operator can run without guessing.", "PLAYER: Where do setup errors begin?", "DEVON BROOKS: Usually in assumptions: wrong revision, wrong datum, wrong tool, or a number nobody independently checked."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 2, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 163, "section": "Factory Workforce", "title": "Quality Inspector \u00b7 Priya Shah", "text": "First articles, measurement plans and root-cause evidence. Growth: quality manager. Watch: Will stop flow when requirements are ambiguous", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: vmc_t2, lathe_cnc_t2, bench_deburr_t1, handoff_terminal_t4", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 3, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 164, "section": "Workforce Conversations", "title": "TALK WITH Priya Shah", "text": "A measurement is evidence only when the method and requirement are both clear.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Quality Inspector", "instructions": ["Bring me the print and the process risk; I will help build the inspection plan.", "I am verifying the first article before we turn one mistake into a batch.", "PLAYER: Why stop for a first article?", "PRIYA SHAH: Because one measured part can protect all the remaining material, machine time, and customer trust."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 3, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 165, "section": "Factory Workforce", "title": "Maintenance Technician \u00b7 Marcus Reed", "text": "Preventive maintenance and fast fault isolation. Growth: reliability lead. Watch: Prefers permanent repairs over quick patches", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: vmc_t2, lathe_cnc_t2, saw_t1, mill_manual_t1, network_node_t3, restroom_station", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 4, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 166, "section": "Workforce Conversations", "title": "TALK WITH Marcus Reed", "text": "Machines usually warn us before they fail. The trick is listening early.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Maintenance Technician", "instructions": ["I can inspect the next preventive-maintenance item before it becomes downtime.", "I am checking lubrication, air, wear, guards, and the fault history at this station.", "PLAYER: Repair now or keep running?", "MARCUS REED: If safety, quality, or further damage is at risk, stop. Planned minutes cost less than an uncontrolled failure."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAt ", "status": "playable", "location": "Assignable to: planning_desk, tool_cart, vmc_t2, lathe_cnc_t2, network_node_t3", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 7, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 172, "section": "Workforce Conversations", "title": "TALK WITH Noah Kim", "text": "A stable process should make the correct result easier than the wrong one.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Manufacturing Engineer", "instructions": ["I can work on the next bottleneck or cost-reduction experiment.", "I am studying capability, constraints, and repeatability at this station.", "PLAYER: What should we improve first?", "NOAH KIM: The constraint that limits customer delivery, provided safety and quality are already protected."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 7, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 173, "section": "Factory Workforce", "title": "Automation Technician \u00b7 Tessa Morgan", "text": "Robot integration, controls and safe recovery. Growth: controls engineer. Watch: Requires disciplined change control", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: network_node_t3, cobot_t5, amr_t5, vmc_t2, lathe_cnc_t2", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 8, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 174, "section": "Workforce Conversations", "title": "TALK WITH Tessa Morgan", "text": "Automation magnifies the process we give it, good or bad.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Automation Technician", "instructions": ["I can validate the next robot routine or controls change.", "I am checking interlocks, recovery states, and safe automatic operation.", "PLAYER: When is automation ready?", "TESSA MORGAN: When the manual process is stable, exceptions are understood, and recovery does not require unsafe improvisation."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 8, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 175, "section": "Factory Workforce", "title": "Shipping & Receiving Coordinator \u00b7 Owen Price", "text": "Certifications, traceability, packing and customer handoff. Growth: logistics manager. Watch: Cannot compensate for incomplete production records", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: nox_terminal, nox_pallet, handoff_terminal_t4, whiteboard", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 9, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 176, "section": "Workforce Conversations", "title": "TALK WITH Owen Price", "text": "The shipment is the last operation, not an afterthought.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Shipping & Receiving Coordinator", "instructions": ["I can prepare packaging and reconcile the next receiving record.", "I am verifying identity, paperwork, protection, and destination before release.", "PLAYER: What makes a clean shipment?", "OWEN PRICE: Correct parts, quantity, certification, protection, label, destination, and a record the customer can trust."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 9, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 177, "section": "Factory Workforce", "title": "Mechanical Maintenance Technician \u00b7 Riley Brooks", "text": "Bearings, spindles, lubrication and mechanical alignment. Growth: reliability lead. Watch: Needs controls support for complex electrical faults", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: vmc_t2, lathe_cnc_t2, saw_t1, mill_manual_t1, restroom_station", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 0, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 178, "section": "Workforce Conversations", "title": "TALK WITH Riley Brooks", "text": "A bearing, spindle, or slide tells a story through heat, sound, and wear.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Mechanical Maintenance Technician", "instructions": ["I can inspect wear items and stage the next preventive-maintenance kit.", "I am checking mechanical condition, lubrication, alignment, guards, and the safe release test.", "PLAYER: Patch it or rebuild it?", "RILEY BROOKS: Protect people and the machine first. Restore the root cause when a patch would only move the failure to tomorrow."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 0, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 179, "section": "Factory Workforce", "title": "Electrical Maintenance Technician \u00b7 Jordan Lee", "text": "Electrical faults, drives, sensors, controls and safe diagnostics. Growth: controls engineer. Watch: Mechanical rebuilds require a partner", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: vmc_t2, lathe_cnc_t2, network_node_t3, cobot_t5, amr_t5", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 1, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 180, "section": "Workforce Conversations", "title": "TALK WITH Jordan Lee", "text": "De-energize, verify, then diagnose. Electricity does not reward shortcuts.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Electrical Maintenance Technician", "instructions": ["I can review alarms, backups, and electrical-panel inspection items.", "I am tracing power, sensors, drives, and controls under the approved lockout procedure.", "PLAYER: Why verify zero energy?", "JORDAN LEE: A switch position is not proof. We test before touching so stored or unexpected energy cannot hurt anyone."], "success": "Conversation text advances through greeting, status, question, and role guidance", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 1, "note": "Conversation portrait and factory-floor sprite share the same employee identity and roster cell."}, {"number": 181, "section": "Factory Workforce", "title": "Facilities Maintenance Technician \u00b7 Taylor Morgan", "text": "Plumbing, HVAC, utilities, inspections and safe facility recovery. Growth: facilities manager. Watch: Not qualified for CNC spindle or servo repair", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Assignable to: restroom_station, nox_pallet, handoff_terminal_t4, network_node_t3", "instructions": ["Hire through Build Your Team", "Assign only to a qualified station", "Worker travels, works, and meanders while idle"], "success": "Visible worker entity is active on the factory floor", "portraitAtlas": "../../packages/assets/sprites/workforce-profile-atlas-v1.png", "portraitCell": 2, "note": "Dedicated employee profile portrait matching the same identity used by the in-shop floor sprite."}, {"number": 182, "section": "Workforce Conversations", "title": "TALK WITH Taylor Morgan", "text": "A safe factory depends on utilities and shared spaces working as reliably as the machines.", "image": "../../packages/assets/story-expansion-male-founder-v1.png", "status": "playable", "location": "Facilities Maintenance Technician", "instructions": ["I can inspect plumbing, HVAC, lighting, exits, and facility supplies before they interrupt the team.", "I am isolating the affected area
