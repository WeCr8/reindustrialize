name: Security and release gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --frozen-lockfile
      - run: pip install playwright
      - run: python -m playwright install --with-deps chromium
      - run: pnpm storybook:release
      - run: pnpm bug-bounty:baseline
      - run: pnpm security:git
      - run: node scripts/validate-release-gate.mjs
      - run: node scripts/validate-storybook-versioning.mjs
      - run: node scripts/validate-workforce-and-founders.mjs
      - run: pnpm audit --prod --audit-level high
